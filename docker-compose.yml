services:
  patch-manager:
    build: .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      PORT: '3000'
      PATCH_SCHEDULE: '0 2 * * *'
      PATCH_CONCURRENCY: '3'
      DATA_DIR: '/data'
    ports:
      - '3000:3000'
    restart: unless-stopped
